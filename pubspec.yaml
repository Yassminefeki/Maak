name: admin_process
description: AI-powered administrative assistant for people with disabilities in Tunisia
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core & State Management
  provider: ^6.1.2
  shared_preferences: ^2.5.3

  # UI & Design
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Database & Storage
  sqflite_common_ffi: ^2.3.0
  sqflite_sqlcipher: ^2.2.1
  flutter_secure_storage: ^9.0.0

  # Voice & Accessibility
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2

  # Image & Camera
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.11.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # AI Integration
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0

  # Internationalization
  intl: ^0.19.0
  permission_handler: ^11.3.0
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - .env
