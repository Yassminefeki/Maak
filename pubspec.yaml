name: admin_process
description: AI-powered administrative assistant for people with disabilities in Tunisia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.11.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/

  # Recommended: Add Arabic-friendly fonts (using Google Fonts is easier)
  # If you want to use custom .ttf files later, you can add them here.